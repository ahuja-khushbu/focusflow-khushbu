version: '3.9'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./server/.env.docker
    environment:
      MONGODB_URI: mongodb://mongo:27017/focusflow
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ''
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  mongo_data:
